{% extends 'reqapp/base.html' %}

{% block title %}User BIO{% endblock %}

{% block body %}
    <h1>User BIO</h1>

    {% if request.POST %}
    <p>Name: {{ request.POST.name }} </p>
    <p>Age: {{ request.POST.age }} </p>
    <p>Bio: {{ request.POST.bio|linebreaks }} </p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <p>
            <label for="name-field" style="display: inline-block; width: 50px">Name</label>
            <input name="name" type="text" id="name-field" maxlength="100" style="width: 100px">
        </p>
        <p>
            <label for="age-field" style="display: inline-block; width: 50px">Age</label>
            <input name="age" type="number" id="age-field" min="10" max="100" style="width: 100px">
        </p>
        <p>
            <label for="bio-field" style="display: block; width: 50px">Bio</label>
            <textarea name="bio" id="bio-field" cols="30" rows="10"></textarea>
        </p>
        <button type="submit">Submit</button>
    </form>
{% endblock %}
